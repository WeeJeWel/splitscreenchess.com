<html>

<head>
  <title>DuoChess</title>

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="DuoChess"
  >
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <link
    rel="stylesheet"
    href="./css/chessboard.css"
  />

  <script
    type="text/javascript"
    src="./js/jquery.js"
  ></script>

  <script
    type="text/javascript"
    src="./js/chess.js"
  ></script>

  <script
    type="text/javascript"
    src="./js/chessboard.js"
  ></script>

  <style type="text/css">
    html,
    body {
      margin: 0;
      padding: 0;
    }

    html {
      overflow: hidden;
      background-color: black;
    }

    #app {
      position: absolute;
      top: env(safe-area-inset-top);
      right: env(safe-area-inset-right);
      bottom: env(safe-area-inset-bottom);
      left: env(safe-area-inset-left);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .board {
      flex-grow: 1;
      flex-shrink: 0;
      aspect-ratio: 1;

      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 2px solid transparent;
      border-radius: 4px;
      transition: border-color 0.25s ease;

      >div {
        >div {
          border: none;
        }
      }
    }

    #middle {
      flex-shrink: 0;
      height: 2vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #board_black,
    body>img[data-orientation="black"] {
      transform: rotate(180deg);
    }

    body.is-resizing .board>div {
      display: none;
    }

    body[data-turn="w"] #board_black,
    body[data-turn="b"] #board_white {
      pointer-events: none;
    }

    body[data-turn="w"] #board_white,
    body[data-turn="b"] #board_black {
      border-color: white;
    }

    .overlay {
      position: absolute;
      z-index: 10;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;

      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;
      font-size: 10vh;

      visibility: hidden;
    }

    body.is-checkmate #overlay-checkmate,
    body.is-draw #overlay-draw {
      visibility: visible;
    }
  </style>

</head>

<body>
  <div id="app">
    <div
      id="board_black"
      class="board"
    ></div>

    <div id="middle"></div>

    <div
      id="board_white"
      class="board"
    ></div>
  </div>

  <div
    class="overlay"
    id="overlay-draw"
  >Draw</div>

  <div
    class="overlay"
    id="overlay-checkmate"
  >Checkmate</div>

  <script type="text/javascript">
    const game = new Chess();

    const board_black = Chessboard('board_black', {
      position: 'start',
      orientation: 'black',
      draggable: true,
      onDragStart,
      onDrop,
      onSnapEnd,
    });

    const board_white = Chessboard('board_white', {
      position: 'start',
      draggable: true,
      onDragStart,
      onDrop,
      onSnapEnd,
      onChange: () => {
        onGameState();
      },
    });

    function onDragStart(source, piece, position, orientation) {
      // do not pick up pieces if the game is over
      if (game.isGameOver()) return false;

      // only pick up pieces for the side to move
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
        (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
    }

    function onDrop(source, target) {
      try {
        // see if the move is legal
        var move = game.move({
          from: source,
          to: target,
          promotion: 'q' // NOTE: always promote to a queen for example simplicity
        })

      } catch (err) {
        // illegal move
        return 'snapback';
      }
    }

    function onSnapEnd() {
      board_white.position(game.fen());
      board_black.position(game.fen());
    }

    function onResize() {
      document.body.classList.add('is-resizing');

      const size = document.getElementById('board_black').clientHeight;
      document.getElementById('board_black').style.width = size + 'px';
      document.getElementById('board_black').style.height = size + 'px';
      document.getElementById('board_white').style.width = size + 'px';
      document.getElementById('board_white').style.height = size + 'px';

      board_white.resize();
      board_black.resize();

      document.body.classList.remove('is-resizing');
    }

    function onGameState() {
      document.body.classList.toggle('is-check', game.inCheck());
      document.body.classList.toggle('is-checkmate', game.isCheckmate());
      document.body.classList.toggle('is-draw', game.isDraw());
      document.body.dataset.turn = game.turn();
    }

    onResize();
    onGameState();

    $(window).resize(() => {
      onResize();
    });

    $('.board').on('scroll touchmove touchend touchstart contextmenu', e => {
      e.preventDefault();
    });
  </script>

</body>

</html>
