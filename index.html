<html>

<head>
  <title>DuoChess</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="DuoChess"
  >
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <link
    rel="stylesheet"
    href="./css/chessboard.css"
  />

  <script
    type="text/javascript"
    src="./js/jquery.js"
  ></script>

  <script
    type="text/javascript"
    src="./js/chess.js"
  ></script>

  <script
    type="text/javascript"
    src="./js/chessboard.js"
  ></script>

  <style type="text/css">
    html,
    body {
      margin: 0;
      padding: 0;
    }

    html {
      overflow: hidden;
      background-color: black;
    }

    #app {
      position: absolute;
      top: env(safe-area-inset-top);
      right: env(safe-area-inset-right);
      bottom: env(safe-area-inset-bottom);
      left: env(safe-area-inset-left);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .board {
      flex-grow: 1;
      flex-shrink: 0;
      aspect-ratio: 1;

      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 0.4vh solid transparent;
      border-radius: 0.4vh;
      transition: border-color 0.25s ease;

      >div {

        >div {
          border: none;

          .is-move-target:before {
            content: '';
            position: absolute;
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.25);
            top: 30%;
            left: 30%;

            pointer-events: none;
          }

          .is-selected {
            box-shadow: inset 0 0 1vh rgb(0, 200, 255);
          }

          .is-move-from,
          .is-move-to {
            box-shadow: inset 0 0 1vh rgb(255, 230, 0);
          }

          .is-check {
            box-shadow: inset 0 0 2vh rgb(255, 0, 0, 1.0);
          }
        }
      }
    }

    #middle {
      flex-shrink: 0;
      height: 2vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #board_black,
    body>img[data-orientation="black"] {
      transform: rotate(180deg);
    }

    body.is-resizing .board>div {
      display: none;
    }

    body[data-turn="w"] #board_black,
    body[data-turn="b"] #board_white {
      pointer-events: none;
    }

    body[data-turn="w"] #board_white,
    body[data-turn="b"] #board_black {
      border-color: white;
    }

    .overlay {
      position: absolute;
      z-index: 10;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;

      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;
      font-size: 10vh;

      visibility: hidden;
    }

    body.is-checkmate #overlay-checkmate,
    body.is-draw #overlay-draw {
      visibility: visible;
    }
  </style>

</head>

<body>
  <div id="app">
    <div
      id="board_black"
      class="board"
    ></div>

    <div id="middle"></div>

    <div
      id="board_white"
      class="board"
    ></div>
  </div>

  <div
    class="overlay"
    id="overlay-draw"
  >Draw</div>

  <div
    class="overlay"
    id="overlay-checkmate"
  >Checkmate</div>

  <script type="module">
    // Initialze Sounds
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioContext = new AudioContext();

    const SOUNDS = {
      move: './audio/move.wav',
      capture: './audio/capture.wav',
      promote: './audio/promote.wav',
      check: './audio/check.wav',
      checkmate: './audio/checkmate.wav',
      castle: './audio/castle.wav',
    };

    const soundBuffers = {};

    // Preload all Sounds
    await Promise.all(Object.entries(SOUNDS).map(async ([soundId, url]) => {
      soundBuffers[soundId] = await fetch(url)
        .then(res => res.arrayBuffer())
        .then(data => audioContext.decodeAudioData(data));
    }));

    function playSound(soundId) {
      const buffer = soundBuffers[soundId];
      if (!buffer) return;

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start(0);
    }

    // Initialize Chess Game
    const game = new Chess();

    const board_black = Chessboard('board_black', {
      position: 'start',
      orientation: 'black',
      draggable: false,
    });

    const board_white = Chessboard('board_white', {
      position: 'start',
      draggable: false,
    });

    function move(from, to) {
      // see if the move is legal
      const move = game.move({
        from,
        to,
        promotion: 'q' // NOTE: always promote to a queen for example simplicity
      });

      board_white.position(game.fen());
      board_black.position(game.fen());

      if (game.isCheckmate()) {
        playSound('checkmate');
      } else if (move.flags.includes('k') || move.flags.includes('q')) {
        playSound('castle');
      } else if (game.isCheck()) {
        playSound('check');
      } else if (move.promotion) {
        playSound('promote');
      } else if (move.captured) {
        playSound('capture');
      } else {
        playSound('move');
      }

      // Reset all classes
      $('.is-move-from').removeClass('is-move-from');
      $('.is-move-to').removeClass('is-move-to');
      $('.is-move-target').removeClass('is-move-target');
      $('.is-selected').removeClass('is-selected');
      $('.is-check').removeClass('is-check');

      // Set move from & to classes
      const turn = game.turn();
      const $board = turn === 'w'
        ? $('#board_white')
        : $('#board_black');

      $('.square-' + move.from, $board).addClass('is-move-from');
      $('.square-' + move.to, $board).addClass('is-move-to');

      // Set check class if in check
      if (game.isCheck()) {
        const [kingSquare] = game.findPiece({
          type: 'k',
          color: turn,
        });
        $('.square-' + kingSquare).addClass('is-check');
      }

      onGameState();
    }

    function onResize() {
      document.body.classList.add('is-resizing');

      const size = document.getElementById('board_black').clientHeight;
      document.getElementById('board_black').style.width = size + 'px';
      document.getElementById('board_black').style.height = size + 'px';
      document.getElementById('board_white').style.width = size + 'px';
      document.getElementById('board_white').style.height = size + 'px';

      board_white.resize();
      board_black.resize();

      document.body.classList.remove('is-resizing');
    }

    function onGameState() {
      document.body.classList.toggle('is-check', game.inCheck());
      document.body.classList.toggle('is-checkmate', game.isCheckmate());
      document.body.classList.toggle('is-draw', game.isDraw());
      document.body.dataset.turn = game.turn();
    }

    onResize();
    onGameState();

    $(window).resize(() => {
      onResize();
    });

    $('.board').on('scroll touchmove touchend touchstart contextmenu', e => {
      e.preventDefault();
    });

    $('.board [data-square]').on('pointerdown', e => {
      const $square = $(e.currentTarget);
      const square = $square.data('square');

      const $board = $square.closest('.board');

      if ($square.hasClass('is-move-target')) {
        const from = $('.is-selected', $board).data('square');
        const to = square;

        return move(from, to);
      }

      if ($square.hasClass('is-selected')) {
        $square.removeClass('is-selected');
        return;
      }

      $('.is-selected', $board).removeClass('is-selected');

      const $piece = $square.find('[data-piece]');
      if (!$piece.length) return;
      const piece = $piece.data('piece');

      // Check if piece belongs to the current player
      const turn = game.turn();
      if ((turn === 'w' && piece.search(/^b/) !== -1) ||
        (turn === 'b' && piece.search(/^w/) !== -1)) {
        return;
      }

      $square.addClass('is-selected');

      // get list of possible moves for this square
      const moves = game.moves({
        square,
        verbose: true
      });

      $('.is-move-target', $board).removeClass('is-move-target');
      for (const move of moves) {
        $(`.square-${move.to}`, $board).addClass('is-move-target');
      }
    });
  </script>

</body>

</html>
